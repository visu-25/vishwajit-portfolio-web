<div class="social-links">
    {% if site.github %}
    <a href="{{ site.github }}" class="social-link" target="_blank" rel="noopener noreferrer" aria-label="GitHub profile">
        <i class="fa-brands fa-github"></i>
    </a>
    {% endif %}
    {% if site.linkedin %}
    <a href="{{ site.linkedin }}" class="social-link" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn profile">
        <i class="fa-brands fa-linkedin-in"></i>
    </a>
    {% endif %}
    <a href="mailto:{{ site.email }}" class="social-link" aria-label="Email">
        <i class="fa-solid fa-envelope"></i>
    </a>
</div>
