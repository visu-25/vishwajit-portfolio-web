<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Portfolio contact</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #222; max-width: 600px; margin: 0 auto; padding: 24px;">
  <h2 style="margin-top: 0;">New portfolio contact message</h2>
  <p>You received a new message from your portfolio contact form.</p>
  <table style="width: 100%; border-collapse: collapse; margin: 20px 0;">
    <tr>
      <td style="padding: 8px 0; font-weight: bold; width: 100px;">Name</td>
      <td style="padding: 8px 0;">{{ contact.name }}</td>
    </tr>
    <tr>
      <td style="padding: 8px 0; font-weight: bold;">Email</td>
      <td style="padding: 8px 0;"><a href="mailto:{{ contact.email }}">{{ contact.email }}</a></td>
    </tr>
    <tr>
      <td style="padding: 8px 0; font-weight: bold;">Sent</td>
      <td style="padding: 8px 0;">{{ contact.created_at }}</td>
    </tr>
  </table>
  <h3 style="margin-bottom: 8px;">Message</h3>
  <p style="white-space: pre-wrap; background: #f5f5f5; padding: 16px; border-radius: 8px;">{{ contact.message }}</p>
  <p style="margin-top: 24px;">
    Reply directly to <a href="mailto:{{ contact.email }}">{{ contact.email }}</a>
  </p>
  {% if site_url %}
  <p style="font-size: 14px; color: #666;">
    <a href="{{ site_url }}/admin/core/contactmessage/{{ contact.pk }}/change/">View in Django Admin</a>
  </p>
  {% endif %}
</body>
</html>
